name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: |
          mkdir -p project
          unzip -o project.zip -d project_raw
          COUNT=$(ls project_raw | wc -l)
          FIRST=$(ls project_raw | head -1)
          if [ "$COUNT" -eq 1 ] && [ -d "project_raw/$FIRST" ]; then
            cp -r project_raw/$FIRST/. project/
          else
            cp -r project_raw/. project/
          fi
          echo '--- Conteudo de project/ ---'
          ls -la project/

      - name: Setup Gradle
        run: |
          cd project
          if [ ! -f gradlew ]; then
            echo 'gradlew nao encontrado, instalando Gradle 8.4...'
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
            unzip -q gradle-8.4-bin.zip
            ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew
          echo '--- gradle wrapper ok ---'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        id: build
        run: |
          cd project
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build.log
          echo 'BUILD_EXIT='${PIPESTATUS[0]} >> $GITHUB_ENV

      - name: Upload build log (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Find and upload APK
        if: success()
        run: |
          APK=$(find project -name '*.apk' | head -1)
          echo "APK encontrado: $APK"
          cp "$APK" app-debug.apk

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
          retention-days: 7
